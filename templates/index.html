<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diabetes Risk Predictor | Yashika Sharma</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🩺 Diabetes Risk Predictor</h1>
    <p class="subtitle">Enter your health details for an AI-based risk assessment</p>
    <form action="/predict" method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Pregnancies <span class="hint">(0 if male)</span></label>
          <input type="number" name="pregnancies" min="0" max="20" step="1" placeholder="e.g. 2" required />
        </div>
        <div class="form-group">
          <label>Glucose <span class="hint">(mg/dL)</span></label>
          <input type="number" name="glucose" min="1" max="300" step="1" placeholder="e.g. 120" required />
        </div>
        <div class="form-group">
          <label>Blood Pressure <span class="hint">(mm Hg)</span></label>
          <input type="number" name="blood_pressure" min="1" max="200" step="1" placeholder="e.g. 70" required />
        </div>
        <div class="form-group">
          <label>Skin Thickness <span class="hint">(mm)</span></label>
          <input type="number" name="skin_thickness" min="1" max="100" step="1" placeholder="e.g. 20" required />
        </div>
        <div class="form-group">
          <label>Insulin <span class="hint">(μU/mL)</span></label>
          <input type="number" name="insulin" min="1" max="900" step="1" placeholder="e.g. 80" required />
        </div>
        <div class="form-group">
          <label>BMI <span class="hint">(kg/m²)</span></label>
          <input type="number" name="bmi" min="1" max="70" step="0.1" placeholder="e.g. 28.5" required />
        </div>
        <div class="form-group">
          <label>Diabetes Pedigree <span class="hint">(family score)</span></label>
          <input type="number" name="dpf" min="0.01" max="3" step="0.01" placeholder="e.g. 0.45" required />
        </div>
        <div class="form-group">
          <label>Age <span class="hint">(years)</span></label>
          <input type="number" name="age" min="1" max="120" step="1" placeholder="e.g. 25" required />
        </div>
      </div>
      <div class="disclaimer-box">
        <input type="checkbox" id="disclaimer" name="disclaimer" required />
        <label for="disclaimer">I understand this tool is for educational purposes only and is not a substitute for professional medical advice.</label>
      </div>
      <button type="submit">🔍 Predict Risk</button>
    </form>
    {% if result %}
    <div class="result {{ result_class }}">
      {{ result }}
      {% if confidence %}
      <div class="confidence">Model Probability: {{ confidence }}</div>
      {% endif %}
    </div>
    {% endif %}
    <p class="note">⚠️ For educational purposes only. Not a medical diagnostic tool.</p>
  </div>
</body>
</html>
